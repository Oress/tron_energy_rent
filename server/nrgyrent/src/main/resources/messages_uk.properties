autodelegate.description = Авто-делегація. \n\n\
    *Що це?* \n\
    Бот стежить за гаманцем і автоматично поповнює його після виконаних транзакцій. \n\n\
    Ціни транзакцій на 0.5 TRX більше ніж замовлення транзакцій вручну. \n\n\
